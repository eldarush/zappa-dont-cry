name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build-lint-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ZappaPromotionSeed.Mocker.sln --configfile NuGet.config

      - name: Build
        run: dotnet build ZappaPromotionSeed.Mocker.sln -c ${{ env.CONFIGURATION }} --no-restore

      - name: Lint mocker config
        shell: bash
        run: |
          if grep -Eq '^Servers:\s*\[\]\s*$' ZappaPromotionSeed.Mocker/mocker.qaas.yaml; then
            echo "Default empty mocker config detected; skipping lint until a server is added."
            exit 0
          fi
          cd ZappaPromotionSeed.Mocker
          dotnet run -c "${{ env.CONFIGURATION }}" --no-build -- -m Lint mocker.qaas.yaml

      - name: Build Docker image
        run: docker build -t qaas-mocker-template .
